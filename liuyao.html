<script>
// 64卦数据：[上卦索引,下卦索引,卦名,卦辞,卦辞解读,运势]
const guaList = [
    [0,0,"乾为天","乾：元亨利贞。","刚健中正，四德俱全。天道运行不息，君子效法此道自强不息，万事可成。","运势（大吉上上）：刚健进取，步步高升；潜龙蓄力、飞龙在天；凡事主动拼搏可得大成，忌骄傲亢进。事业、求财、考试皆大利。"],
    [0,1,"天泽履","履：履虎尾，不咥人，亨。","踩虎尾而未被咬伤，险中求安之象。只要谨慎守礼、步步小心，虽处险境亦能亨通。","运势（中吉）：如踩薄冰，凡事谨慎守底线；风险暗藏，步步小心则无灾祸，利公职、严谨行业。"],
    [0,2,"天火同人","同人：同人于野，亨。利涉大川，利君子贞。","与人和同于旷野，心胸开阔则亨通。同心协力可渡难关，君子守正得吉。","运势（大吉）：同心协力，众人帮扶；团队项目、合伙创业、人际往来一帆风顺。"],
    [0,3,"天雷无妄","无妄：元亨，利贞。其匪正有眚，不利有攸往。","不妄为则大亨通。若动机不纯、行为不正，必有灾祸，不宜妄动，顺其自然即可。","运势（中吉）：守正道则无灾祸，妄想投机必遭殃；脚踏实地安稳得利，偏财、投机不利。"],
    [0,4,"天风姤","姤：女壮，勿用取女。","一阴遇五阳，不期而遇之象。女子过强则不宜娶，喻示意外相遇中暗藏隐患，须防小人近身。","运势（下签）：偶遇隐患，阴邪近身；突如其来的烂桃花、小人、陷阱，防意外诱惑。"],
    [0,5,"天水讼","讼：有孚窒惕，中吉，终凶。利见大人，不利涉大川。","诚信受阻而生争讼，适可而止则吉，纠缠到底必凶。宜找贵人调解，不宜冒险行事。","运势（下签凶）：口舌纷争、官司是非；凡事以和为贵，争执两败俱伤，合作易反目。"],
    [0,6,"天山遁","遁：亨，小利贞。","退避之时亦有亨通，小事守正可获小利。大势已去则暂退，保存实力以待将来。","运势（中下）：运势下行，宜及时退避；竞争失利、环境变差，主动抽身才能避开损耗。"],
    [0,7,"天地否","否：否之匪人，不利君子贞，大往小来。","天地不交，万物不通，君子退守、小人得势之时。此时不宜作为，静待否极泰来。","运势（下下凶）：阴阳隔绝，诸事阻滞；贵人远离、小人当道，任何大事暂缓，只宜闭门守静。"],
    [1,0,"泽天夬","夬：扬于王庭，孚号有厉。告自邑，不利即戎，利有攸往。","决断应在公开场合，诚心呼号仍有危险。先内部整顿，不宜武力解决，果断前行可成。","运势（中下）：清除小人，决断割裂；必须和损友、烂项目切割，犹豫则被拖累。"],
    [1,1,"兑为泽","兑：亨，利贞。","兑为悦，以喜悦之心待人接物则亨通。但须坚守正道，不可谄媚取悦、巧言令色。","运势（吉）：喜悦沟通，人缘顺畅；谈判、社交、宣讲、洽谈大利，和人交流易得好处。"],
    [1,2,"泽火革","革：己日乃孚。元亨，利贞，悔亡。","变革需待时机成熟（己日），取得信任后方可行动。彻底变革则大亨，悔恨自消。","运势（中吉）：破旧立新，变革转机；行业转型、换工作、改模式，彻底革新方能走出困境。"],
    [1,3,"泽雷随","随：元亨，利贞，无咎。","随顺时势、随从正道则大亨。不固执己见，择善而从，自然无咎。","运势（吉）：顺势随从，跟随强者；不固执己见，跟着大趋势、靠谱前辈走，事半功倍。"],
    [1,4,"泽风大过","大过：栋桡，利有攸往，亨。","栋梁弯曲，房屋将倾，喻非常时期。此时需挺身而出，前往处理则可亨通，但不可过度行事。","运势（中下）：行事过头，失衡冒险；激进投资、极端抉择极易翻车，除非迫不得已不做大变动。"],
    [1,5,"泽水困","困：亨，贞，大人吉，无咎。有言不信。","处困之时仍可亨通，守正则吉。言语难被人信，不必多言，坚守本心以待解脱。","运势（下签）：财路闭塞，处处受困；缺钱、缺人脉、处处受限，只宜修身守志，不谋进取。"],
    [1,6,"泽山咸","咸：亨，利贞，取女吉。","感应相通，心意相合则亨通。如同少男少女自然相感，婚恋最吉，万事以诚相交。","运势（吉·姻缘主卦）：感应相通，情缘相遇；婚恋、人际互相吸引，一见钟情，适合相亲、合作结缘。"],
    [1,7,"泽地萃","萃：亨。王假有庙，利见大人，亨，利贞。用大牲吉，利有攸往。","聚集之时亨通，见贵人、行大事皆利。诚意备至，团结各方可成大业。","运势（大吉）：群英汇聚，资源聚拢；招商、聚会、招人、求财，人气财气齐聚。"],
    [2,0,"火天大有","大有：元亨。","大有收获，元始亨通。阳光普照万物，喻示拥有丰盛资源，得时得势至极。","运势（上上大吉）：丰收鼎盛，资源丰厚；求财、事业收获极大，但切忌奢靡扩张，居安思危。"],
    [2,1,"火泽睽","睽：小事吉。","乖离相悖之时，只宜小事可吉。求同存异、以柔合睽，不可大事强求。","运势（中平）：意见相悖，隔阂矛盾；情侣、合伙人、家人容易争吵，沟通错位，合作易分裂。"],
    [2,2,"离为火","离：利贞，亨。畜牝牛吉。","离为火、为明，依附光明守正则亨通。柔顺如母牛则吉，喻示依附之道贵在柔顺中正。","运势（吉）：光明显现，声名外露；利名声、考试、宣传、文职，依附贵人可发光发热。"],
    [2,3,"火雷噬嗑","噬嗑：亨，利用狱。","口中有物，咬合而通。喻有阻碍必须咬断，利于公正裁决、果断处理纠纷。","运势（中平）：遇阻碍必须强硬突破；有小人、关卡阻拦，公正果断处理才能扫清障碍。"],
    [2,4,"火风鼎","鼎：元吉，亨。","鼎为烹饪之器，喻立国重器。革故鼎新，建立新制则大吉亨通。","运势（元吉上上）：除旧布新，基业稳固；立新项目、创立事业、改换赛道，奠定长久根基。"],
    [2,5,"火水未济","未济：亨。小狐汔济，濡其尾，无攸利。","事未成尚有希望。小狐渡河湿尾，喻急于求成反招损失，慎终如始方可成功。","运势（中平）：万事未成，循环再起；事情尚未收尾，局势未定，变数极大，坚持推进方能完成。"],
    [2,6,"火山旅","旅：小亨，旅贞吉。","旅居在外，小有亨通。守正低调则吉，不可张扬喧宾夺主。","运势（中下）：漂泊无根，寄人篱下；异地工作、出差、旅居无依靠，凡事谨慎，不可久留外地。"],
    [2,7,"火地晋","晋：康侯用锡马蕃庶，昼日三接。","晋升之象如诸侯受赏，一日三接。喻光明上升，得贵人赏识，步步高升。","运势（大吉）：步步高升，前途光明；升职、晋级、考核、升迁最利，贵人持续扶持。"],
    [3,0,"雷天大壮","大壮：利贞。","阳刚壮盛，势不可挡。但壮而不可妄动，守正方利，恃强则凶。","运势（中吉）：力量强盛，势头强劲；事业上升，但不可恃强冲动，刚猛过头易招祸。"],
    [3,1,"雷泽归妹","归妹：征凶，无攸利。","少女出嫁本该为喜，但卦象名分不正。喻名不正则言不顺，强行必凶，不可妄动。","运势（下凶）：身份错位，匹配失衡；婚恋不对等、越位行事，关系、合作长久必有矛盾损耗。"],
    [3,2,"雷火丰","丰：亨，王假之，勿忧，宜日中。","丰大盛极，王亲临其境。日中则昃，盛极必衰，享丰盛之时需思衰败之患。","运势（吉·盛极藏衰）：鼎盛繁华，财运人气顶点；但繁华之下藏漏洞，切忌铺张，及时储备防衰退。"],
    [3,3,"震为雷","震：亨。震来虩虩，笑言哑哑。震惊百里，不丧匕鬯。","雷震来袭令人惊惧，但若镇定自若，虽震惊百里仍不失手中祭器。临危不乱则亨。","运势（中平）：突发震动，警醒避险；意外变故、突发消息，稳住心神不慌乱，可化险为夷。"],
    [3,4,"雷风恒","恒：亨，无咎，利贞，利有攸往。","恒久之道亨通无咎。守正不移、持之以恒，则凡事可成，利在坚持。","运势（上吉）：长久稳定，持之以恒；婚姻、长期事业、长线投资大利，切忌三分钟热度。"],
    [3,5,"雷水解","解：利西南，无所往，其来复吉。有攸往，夙吉。","困厄解除，宜顺势而行。无所往则静待回复，有所往则及早行动，皆吉。","运势（中吉）：困厄消散，枷锁解开；之前的麻烦、官司、阻滞全部化解，适合脱困行动。"],
    [3,6,"雷山小过","小过：亨，利贞，可小事，不可大事。飞鸟遗之音，不宜上，宜下，大吉。","小有过失仍可亨通。宜做小事不宜做大事，宜低调不宜高调，如此大吉。","运势（中下）：小有过失，分寸失衡；小事出错、言行越界，大事不可妄动，谨守分寸。"],
    [3,7,"雷地豫","豫：利建侯行师。","豫为安乐和悦，利于建立诸侯、出兵行事。顺势而为，筹备大事可得成功。","运势（吉）：安乐顺遂，心想事成；适合休闲、婚嫁、庆典、投资，容易收获喜悦。"],
    [4,0,"风天小畜","小畜：亨。密云不雨，自我西郊。","密云聚而雨未降，蓄积之力尚不足以大施。小有积蓄但未到发力之时，宜继续积累。","运势（中签）：小有积蓄，力量不足；只能小规模积累，无法大展宏图，适合节流储备。"],
    [4,1,"风泽中孚","中孚：豚鱼吉，利涉大川，利贞。","诚信感化豚鱼，至诚可通天地。心怀诚信则无往不利，可渡大险。","运势（元吉）：诚信为本，内外信任；谈判、借贷、婚恋、合作，真诚待人必获圆满。"],
    [4,2,"风火家人","家人：利女贞。","家道之正，女主内守正则吉。家宅安宁、内外有序，一切以家庭和睦为本。","运势（吉）：家宅安稳，内和外顺；家庭和睦、内部团队稳定，居家、内务、小店经营大利。"],
    [4,3,"风雷益","益：利有攸往，利涉大川。","增益之道，利于行动。顺势而行、助人利己，可渡大险，大有进益。","运势（上上大吉）：增益获利，多方帮扶；求财、创业、助人皆有回报，处处有机遇，利于扩张。"],
    [4,4,"巽为风","巽：小亨，利有攸往，利见大人。","巽为入、为顺，谦逊柔顺可获小亨。宜顺从大势、见贵人，不可强硬对抗。","运势（中吉）：谦逊顺势，循序渐进；灵活变通、低调行事可得机遇，刚性对抗不利。"],
    [4,5,"风水涣","涣：亨。王假有庙，利涉大川，利贞。","涣为涣散，但王至庙中凝聚人心。散中有聚，可渡大险，守正则利。","运势（中平）：涣散分离，人心离散；合伙、家庭容易分散，及时凝聚人心，化解隔阂。"],
    [4,6,"风山渐","渐：女归吉，利贞。","渐渐前进，如女子出嫁循序渐进则吉。凡事不可急躁，安然循序则吉。","运势（上吉·婚恋晋升）：循序渐进，稳扎稳打；婚恋磨合、职场晋升、项目落地忌速成，稳步推进根基扎实。"],
    [4,7,"风地观","观：盥而不荐，有孚颙若。","祭祀之前净手而未献祭，以虔诚之心示人。观察之道在于真诚，不必急于表现。","运势（中平）：只宜观察，不可行动；看清局势再决策，贸然出手容易踩坑，利考察调研。"],
    [5,0,"水天需","需：有孚，光亨，贞吉。利涉大川。","需为等待，心怀诚信则光明亨通。耐心等待时机，可渡大险。","运势（中平）：时机未到，宜静心等待；贸然出击必遇险阻，沉淀资源、静待时机自然亨通。"],
    [5,1,"水泽节","节：亨。苦节不可贞。","节制适度则亨通。过度苛刻的节制不可长久，贵在张弛有度。","运势（吉）：节制有度，收支平衡；节流管控、规划计划，克制欲望方能长久富足。"],
    [5,2,"水火既济","既济：亨小，利贞，初吉终乱。","已成功之时，小事亨通。初始吉利但终将生乱，成功之后须防衰败。","运势（上上吉·盛终藏危）：万事圆满，诸事成功；计划落地、心愿达成，但圆满之后极易衰败，不可松懈。"],
    [5,3,"水雷屯","屯：元亨，利贞，勿用有攸往，利建侯。","万物初生，艰难险阻。此时不宜远行，宜建国封侯，开创基业需从根本做起。","运势（中下签）：万事初创、阻力重重；如同种子破土，起步极难，坚持蓄力方能成活，不宜大举扩张。"],

const kingWenNum = [
    1,10,13,25,44, 6,33,12,
   43,58,49,17,28,47,31,45,
   14,38,30,21,50,64,56,35,
   34,54,55,51,32,40,62,16,
    9,61,37,42,57,59,53,20,
    5,60,63, 3,48,29,39, 8,
   26,41,22,27,18, 4,52,23,
   11,19,36,24,46, 7,15, 2
];
const baGuaNames = ["乾","兑","离","震","巽","坎","艮","坤"];
// 转换单爻为阴阳：7/9阳→0，6/8阴→1
function yao2Bin(n){
    if(n==7||n==9) return 0;
    return 1;
}
// 获取本卦上下卦二进制 [下三爻,上三爻]
function getBenGua(yArr){
    const xia = [yao2Bin(yArr[0]), yao2Bin(yArr[1]), yao2Bin(yArr[2])];
    const shang = [yao2Bin(yArr[3]), yao2Bin(yArr[4]), yao2Bin(yArr[5])];
    // 转卦索引数字
    let xiaCode = xia[0]*4 + xia[1]*2 + xia[2]*1;
    let shangCode = shang[0]*4 + shang[1]*2 + shang[2]*1;
    return [shangCode, xiaCode];
}
// 变卦：老阳9变阴→1，老阴6变阳→0，少阳少阴不变
function getBianYao(y){
    if(y==9) return 1;
    if(y==6) return 0;
    return yao2Bin(y);
}
function getBianGua(yArr){
    const xia = [getBianYao(yArr[0]), getBianYao(yArr[1]), getBianYao(yArr[2])];
    const shang = [getBianYao(yArr[3]), getBianYao(yArr[4]), getBianYao(yArr[5])];
    let xiaCode = xia[0]*4 + xia[1]*2 + xia[2]*1;
    let shangCode = shang[0]*4 + shang[1]*2 + shang[2]*1;
    return [shangCode, xiaCode];
}
// 根据上下码查卦（直接索引）
function findGua(shang, xia){
    return guaList[shang*8 + xia];
}
// 绘制卦画（通用格式）
function drawYao(yArr){
    const lbl = ["初爻","二爻","三爻","四爻","五爻","六爻"];
    const names = {6:"老阴",7:"少阳",8:"少阴",9:"老阳"};
    let html = '<div class="yao-stack">';
    for(let i=5; i>=0; i--){
        let v = yArr[i];
        let yang = (v===7||v===9);
        let old = (v===6||v===9);
        html += '<div class="yao-row">';
        html += '<div class="yao-line-wrap">';
        html += '<div class="yao-line">';
        if(yang){
            html += '<span class="seg s-full"></span>';
        }else{
            html += '<span class="seg s-left"></span><span class="gap"></span><span class="seg s-right"></span>';
        }
        html += '</div>';
        if(old){
            let mark = yang ? '○' : '×';
            html += `<span class="yao-mark ${yang?'old-yang':'old-yin'}">${mark}</span>`;
        }else{
            html += '<span class="yao-mark"></span>';
        }
        html += '</div>';
        html += `<span class="yao-lbl">${lbl[i]}　${names[v]}</span>`;
        html += '</div>';
    }
    html += '</div>';
    return html;
}
// 主逻辑
function compute(yArr){
    // 动爻统计
    let dongList = [];
    yArr.forEach((v,i)=>{ if(v===6||v===9) dongList.push(i+1); })
    // 本卦
    const benCode = getBenGua(yArr);
    const benGua = findGua(benCode[0], benCode[1]);
    // 变卦
    const bianCode = getBianGua(yArr);
    const bianGua = findGua(bianCode[0], bianCode[1]);
    let benIdx = benCode[0]*8 + benCode[1];
    let bianIdx = bianCode[0]*8 + bianCode[1];
    let html = "";
    html += `<div class="gua-title">本卦：${benGua[2]}（第 ${kingWenNum[benIdx]} 卦）</div>`;
    html += `<div class="desc">下卦${baGuaNames[benCode[1]]} + 上卦${baGuaNames[benCode[0]]}，${baGuaNames[benCode[0]]}上${baGuaNames[benCode[1]]}下</div>`;
    html += drawYao(yArr);
    html += `<div class="desc">卦辞：${benGua[3]}</div>`;
    html += `<div class="desc">解读：${benGua[4]}</div>`;
    html += `<div class="desc">${benGua[5]}</div>`;
    if(dongList.length>0){
        html += `<div class="desc" style="color:#d32f2f">动爻：${dongList.join("、")}爻</div>`;
        html += `<div class="gua-title">变卦：${bianGua[2]}（第 ${kingWenNum[bianIdx]} 卦）</div>`;
        html += `<div class="desc">下卦${baGuaNames[bianCode[1]]} + 上卦${baGuaNames[bianCode[0]]}，${baGuaNames[bianCode[0]]}上${baGuaNames[bianCode[1]]}下</div>`;
        // 变卦取变动后的爻值
        let bianYArr = yArr.map(v=>getBianYao(v));
        html += drawYao(bianYArr);
        html += `<div class="desc">卦辞：${bianGua[3]}</div>`;
        html += `<div class="desc">解读：${bianGua[4]}</div>`;
        html += `<div class="desc">${bianGua[5]}</div>`;
    }else{
        html += `<div class="desc">无动爻，为本卦静卦</div>`;
    }
    document.getElementById("result").innerHTML = html;
}
document.getElementById("calcBtn").onclick = function(){
    const yArr = [1,2,3,4,5,6].map(i=>Number(document.getElementById("y"+i).value));
    compute(yArr);
};
